<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Lumina Fleet — บริการรถตู้รับส่งพนักงานโรงงาน แบบ isometric 3D" />
  <title>Lumina Fleet — Factory Commuter Transport</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <canvas id="iso-canvas" aria-label="ฉาก 3D isometric จุดจอดรถตู้โรงงาน"></canvas>

  <!-- Brand / hero overlay (first viewport) -->
  <header class="ui-layer hero">
    <div class="brand-block">
      <p class="brand-mark">LUMINA FLEET</p>
      <h1 class="brand-headline">รับส่งพนักงานโรงงาน</h1>
      <p class="brand-sub">คลิกที่รถตู้ในฉากเพื่อดูรายละเอียดเส้นทางกะงาน</p>
    </div>
    <div class="cta-row">
      <button type="button" class="btn btn-primary" id="btn-focus-van">ดูรถตู้</button>
      <a class="btn btn-ghost" href="#van-card">จองที่นั่ง</a>
    </div>
  </header>

  <p class="hint" id="hint">ลากเพื่อหมุนมุมมอง · คลิกที่รถตู้เพื่อเปิดข้อมูล</p>

  <!-- Glassmorphism van detail card (shown on van hover/click) -->
  <aside class="glass-card" id="van-card" hidden aria-live="polite">
    <button type="button" class="glass-close" id="card-close" aria-label="ปิด">×</button>
    <div class="glass-header">
      <span class="glass-badge" id="card-status">พร้อมวิ่ง</span>
      <h2 class="glass-title" id="card-route">สาย A — นิคมบางปะอิน</h2>
    </div>
    <dl class="glass-meta">
      <div>
        <dt>กะงาน</dt>
        <dd id="card-shift">เช้า 05:30 – 06:15</dd>
      </div>
      <div>
        <dt>คนขับ</dt>
        <dd id="card-driver">สมชาย พิทักษ์ · ป้ายเหลือง</dd>
      </div>
      <div>
        <dt>ที่นั่งว่าง</dt>
        <dd id="card-seats">6 / 14</dd>
      </div>
      <div>
        <dt>ทะเบียน</dt>
        <dd id="card-plate">กข 4521</dd>
      </div>
    </dl>
    <button type="button" class="btn btn-primary btn-block" id="btn-book">จองที่นั่งในสายนี้</button>
  </aside>

  <div class="loader" id="loader">
    <div class="loader-bar"></div>
    <span>กำลังโหลดฉาก isometric…</span>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
